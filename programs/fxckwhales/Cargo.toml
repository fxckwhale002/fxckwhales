[package]
name = "fxckwhales"
version = "0.1.0"
description = "Anti-whale transfer hook program"
edition = "2021"

[lib]
crate-type = ["cdylib", "lib"]
name = "fxckwhales"

[features]
default = []
no-entrypoint = []
idl-build = ["anchor-lang/idl-build"]
cpi = []
anchor-debug = []
no-idl = []
no-log-ix-name = []
custom-heap = []
custom-panic = []

[dependencies]
anchor-lang = "0.29.0"
anchor-spl = "0.29.0"

# Usamos SPL desde github en un commit conocido (evita que Cargo te meta Solana 2.x)
spl-transfer-hook-interface = { git = "https://github.com/solana-labs/solana-program-library", rev = "88547d85c1cbe63feb2f79160d3070075a9e156a", default-features = false }
spl-tlv-account-resolution   = { git = "https://github.com/solana-labs/solana-program-library", rev = "88547d85c1cbe63feb2f79160d3070075a9e156a", default-features = false }
spl-type-length-value        = { git = "https://github.com/solana-labs/solana-program-library", rev = "88547d85c1cbe63feb2f79160d3070075a9e156a", default-features = false }
spl-token = "=4.0.0"
spl-token-2022 = "=0.9.0"

